<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A1628;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0B0B0C;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1E4D8C;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0F2B4F;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="stripeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#D4AF37;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#D4AF37;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#D4AF37;stop-opacity:0"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Outer shield shape -->
  <rect x="40" y="20" width="720" height="560" rx="40" fill="url(#bgGrad)" stroke="#1E4D8C" stroke-width="2" filter="url(#shadow)"/>

  <!-- Gold accent line top -->
  <rect x="80" y="20" width="640" height="3" fill="#D4AF37" opacity="0.6" rx="1.5"/>

  <!-- === BRAND NAME === -->
  <text x="400" y="80" text-anchor="middle" font-family="'Trebuchet MS','Segoe UI',Arial,sans-serif" font-weight="900" font-size="42" fill="#FFFFFF" letter-spacing="4">MR LEXAR'S</text>
  <text x="400" y="108" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-weight="600" font-size="14" fill="#D4AF37" letter-spacing="6">CROSS BORDER TRANSPORTATION</text>

  <!-- Divider -->
  <rect x="200" y="125" width="400" height="1" fill="url(#stripeGrad)"/>

  <!-- === TAXI/BUS ICON === -->
  <g transform="translate(400, 310)" filter="url(#glow)">
    <!-- Road beneath -->
    <rect x="-180" y="100" width="360" height="6" rx="3" fill="#1E4D8C" opacity="0.4"/>
    <line x1="-170" y1="103" x2="170" y2="103" stroke="#D4AF37" stroke-width="2" stroke-dasharray="12,8" opacity="0.5"/>

    <!-- Shadow under vehicle -->
    <ellipse cx="0" cy="100" rx="160" ry="8" fill="#000" opacity="0.4"/>

    <!-- Main body -->
    <rect x="-140" y="-15" width="280" height="65" rx="10" fill="#FFFFFF"/>

    <!-- Blue body stripe -->
    <rect x="-140" y="10" width="280" height="20" rx="0" fill="#1E4D8C"/>
    <rect x="-140" y="10" width="280" height="20" clip-path="url(#stripeClip)" fill="#2563EB"/>

    <!-- Gold accent stripe -->
    <rect x="-140" y="8" width="280" height="3" fill="#D4AF37" opacity="0.8"/>

    <!-- Roof / cabin -->
    <path d="M-100 -15 Q-100 -55 -65 -55 L65 -55 Q100 -55 100 -15" fill="#FFFFFF"/>

    <!-- Roof rack lines -->
    <line x1="-80" y1="-55" x2="-80" y2="-50" stroke="#E0E0E0" stroke-width="2"/>
    <line x1="80" y1="-55" x2="80" y2="-50" stroke="#E0E0E0" stroke-width="2"/>

    <!-- Windshield -->
    <path d="M-95 -15 Q-90 -48 -65 -48 L-25 -48 L-25 -15 Z" fill="#0A1628" opacity="0.85"/>
    <path d="M95 -15 Q90 -48 65 -48 L25 -48 L25 -15 Z" fill="#0A1628" opacity="0.85"/>

    <!-- Side windows -->
    <rect x="-20" y="-48" width="40" height="30" rx="4" fill="#0A1628" opacity="0.85"/>
    <rect x="25" y="-48" width="40" height="30" rx="4" fill="#0A1628" opacity="0.85"/>

    <!-- Window reflections -->
    <line x1="-15" y1="-45" x2="-5" y2="-22" stroke="#FFFFFF" stroke-width="1.5" opacity="0.15"/>
    <line x1="30" y1="-45" x2="40" y2="-22" stroke="#FFFFFF" stroke-width="1.5" opacity="0.15"/>

    <!-- Headlight -->
    <rect x="-145" y="-5" width="8" height="25" rx="3" fill="#D4AF37" opacity="0.6"/>
    <rect x="137" y="-5" width="8" height="25" rx="3" fill="#D4AF37" opacity="0.6"/>

    <!-- Tail light -->
    <rect x="-145" y="25" width="6" height="12" rx="2" fill="#FF4444" opacity="0.7"/>
    <rect x="139" y="25" width="6" height="12" rx="2" fill="#FF4444" opacity="0.7"/>

    <!-- Wheels -->
    <circle cx="-85" cy="50" r="22" fill="#1A1A1A"/>
    <circle cx="-85" cy="50" r="16" fill="#333333"/>
    <circle cx="-85" cy="50" r="6" fill="#D4AF37"/>
    <circle cx="-85" cy="50" r="3" fill="#0B0B0C"/>

    <circle cx="85" cy="50" r="22" fill="#1A1A1A"/>
    <circle cx="85" cy="50" r="16" fill="#333333"/>
    <circle cx="85" cy="50" r="6" fill="#D4AF37"/>
    <circle cx="85" cy="50" r="3" fill="#0B0B0C"/>

    <!-- Wheel spokes -->
    <g stroke="#555" stroke-width="1" opacity="0.5">
      <line x1="-85" y1="34" x2="-85" y2="66"/>
      <line x1="-101" y1="50" x2="-69" y2="50"/>
      <line x1="85" y1="34" x2="85" y2="66"/>
      <line x1="69" y1="50" x2="101" y2="50"/>
    </g>

    <!-- Side mirror -->
    <rect x="-140" y="-20" width="6" height="12" rx="2" fill="#333"/>
    <rect x="134" y="-20" width="6" height="12" rx="2" fill="#333"/>

    <!-- License plate -->
    <rect x="-30" y="45" width="60" height="16" rx="3" fill="#0A1628" stroke="#D4AF37" stroke-width="1"/>
    <text x="0" y="57" text-anchor="middle" font-family="monospace" font-size="8" fill="#D4AF37" font-weight="bold">MR LEXAR</text>

    <!-- Small crown/star on roof (premium touch) -->
    <polygon points="0,-60 5,-50 15,-50 8,-43 10,-33 0,-38 -10,-33 -8,-43 -15,-50 -5,-50" fill="#D4AF37" opacity="0.7"/>
  </g>

  <!-- === CONTACT INFO === -->
  <!-- Divider -->
  <rect x="150" y="395" width="500" height="1" fill="url(#stripeGrad)"/>

  <!-- Phone numbers -->
  <g transform="translate(400, 430)">
    <rect x="-100" y="-18" width="200" height="36" rx="18" fill="#1E4D8C" opacity="0.3" stroke="#1E4D8C" stroke-width="1"/>
    <!-- Phone icon -->
    <circle cx="-85" cy="0" r="12" fill="none" stroke="#D4AF37" stroke-width="1.5"/>
    <text x="-85" y="5" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#D4AF37">📞</text>

    <text x="-20" y="-4" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-weight="600" font-size="14" fill="#FFFFFF">+27 71 077 9990</text>
    <text x="120" y="-4" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-weight="600" font-size="14" fill="#FFFFFF">+263 77 975 1069</text>

    <!-- WhatsApp labels -->
    <text x="-20" y="12" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#D4AF37" opacity="0.7">SA / Botswana</text>
    <text x="120" y="12" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#D4AF37" opacity="0.7">Zimbabwe</text>
  </g>

  <!-- Email -->
  <g transform="translate(400, 475)">
    <!-- Email icon -->
    <rect x="-155" y="-10" width="20" height="14" rx="2" fill="none" stroke="#D4AF37" stroke-width="1.5"/>
    <path d="M-155 -10 L-145 0 L-135 -10" fill="none" stroke="#D4AF37" stroke-width="1.5"/>
    <text x="-110" y="3" font-family="'Segoe UI',Arial,sans-serif" font-size="13" fill="#FFFFFF" opacity="0.9">alexiousuwenyu@gmail.com</text>
  </g>

  <!-- Bottom gold accent line -->
  <rect x="80" y="577" width="640" height="3" fill="#D4AF37" opacity="0.6" rx="1.5"/>

  <!-- Routes -->
  <text x="400" y="535" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="12" fill="#D4AF37" opacity="0.8" letter-spacing="3">SOUTH AFRICA ✦ BOTSWANA ✦ ZIMBABWE</text>

  <!-- Small corner accents -->
  <rect x="40" y="20" width="20" height="20" fill="none" stroke="#D4AF37" stroke-width="2" opacity="0.3"/>
  <rect x="740" y="20" width="20" height="20" fill="none" stroke="#D4AF37" stroke-width="2" opacity="0.3"/>
  <rect x="40" y="560" width="20" height="20" fill="none" stroke="#D4AF37" stroke-width="2" opacity="0.3"/>
  <rect x="740" y="560" width="20" height="20" fill="none" stroke="#D4AF37" stroke-width="2" opacity="0.3"/>
</svg>
